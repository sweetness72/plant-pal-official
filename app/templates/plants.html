<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Garden | Plant Pal</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/static/js/tw-config.js"></script>
<style>
.glass-panel {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.paper-texture {
  background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDDYG17p0oFwxGAAmofze9x_ZPDv51h37g__0mp8Wy00zI4QHyAe1YWO_Wu08LezIFAAJ-1SrNZDYFNl-7yYSD-G1q5_HcMZRAtZQsYMGrDg3YuVF4LMYFUFY0mUBB0kSg_y3thnBH0n9GPoDQzhouQ1-uuKIjh7G2qFb7RxKT2qqToakw_FeuGrGQ9iS0NSYUBmFarwMjrwtrQvCjS-1dgbBicx2WWbm5l8ywSNb9DXAIWZmOP5YXV2Gu07NroMKElJYaTKSFXGKM);
  background-blend-mode: overlay;
}
.material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
body {
  font-family: "Plus Jakarta Sans", sans-serif;
  color: #3a391a;
  background-color: #fcfcf7;
}
h1, h2, h3, .serif-italic { font-family: "Newsreader", serif; }
</style>
</head>
<body class="min-h-screen relative overflow-x-hidden font-body pb-28 md:pb-12">
<div class="fixed inset-0 z-0 opacity-15 overflow-hidden pointer-events-none">
<img class="w-full h-full object-cover" alt="" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmPT8HHfjo7zzqKcsbco4ztOpUJj9sN88qAS22n1tmgQkAoTytZq2Y7nnyccasG6ea5nURAgEgwlgMJ4w0iypoIHbp0RMqQyh1DOZNDf_jIBR0-sgqe5QSYPkVuw_IDwoJvect2be6mZo8rgdbEk0rgX0zAOTCa1mYVNyzQK6yMzqpyD5zOg8zoZKRKXEOcfiSNfR4jY5ZnYw9K1Vxed9ow6IC1Bzcc2hgOj9UlI86b3c-gGIurZsYAro81HWdCvSDbuEsTxvr7v0"/>
</div>
{% include "_components/nav.html" %}
<main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
<div id="main">
{{ added_msg|safe }}
<div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-8">
<div class="space-y-3">
<h1 class="text-6xl md:text-7xl font-light tracking-tight text-on-surface font-headline">My Garden</h1>
<p class="text-stone-500 text-xl serif-italic">{{ plants_count }} {{ life_word }} in your care.</p>
</div>
<div class="flex flex-col sm:flex-row sm:items-center gap-6">
<div class="flex items-center text-stone-400">
<span class="material-symbols-outlined text-sm mr-2" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-xs font-bold tracking-widest uppercase">{{ care_streak }} Day Streak</span>
</div>
<form class="relative inline-block" method="get" action="/plants">
{{ sort_hidden|safe }}
<select name="sort" onchange="this.form.submit()" class="appearance-none bg-transparent text-primary border-b border-stone-200 rounded-none px-0 py-2 pr-8 focus:ring-0 cursor-pointer text-sm font-bold uppercase tracking-widest">
<option value="due" {{ sel_due }}>DUE SOON</option>
<option value="room" {{ sel_room }}>BY ROOM</option>
<option value="name" {{ sel_name }}>ALPHABETICAL</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-primary text-lg">expand_more</span>
</form>
</div>
</div>
<div class="mb-24">
<div id="plant-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">{{ content|safe }}</div>
<div class="mt-24 pt-12 border-t border-stone-100 flex flex-col md:flex-row justify-between items-center gap-10">
<div class="flex items-center gap-8 opacity-40">
<span class="material-symbols-outlined text-stone-400">eco</span>
<span class="material-symbols-outlined text-stone-400">water_drop</span>
<span class="material-symbols-outlined text-stone-400">sunny</span>
</div>
{{ view_all_block|safe }}
</div>
</div>
</div>
</main>
</body>
</html>
